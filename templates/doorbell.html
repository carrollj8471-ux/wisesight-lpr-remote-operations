<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Front Door Live Stream</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<header class="app-header">

    <div class="brand-block">
        <div>
            <p class="eyebrow">WiseSight LPR Remote Operations</p>
            <h1>Front Door Live</h1>
        </div>
    </div>

    <a class="header-link" href="{{ url_for('index') }}">Back to Dashboard</a>

</header>

<main class="container">

    <section class="panel live-panel">

        <div class="panel-heading">
            <h2>Front door doorbell</h2>
            <span id="streamStatus">Ready</span>
        </div>

        <div class="live-video-frame">
            <video
                id="doorbellVideo"
                autoplay
                controls
                playsinline
            ></video>
        </div>

        <div class="live-actions">
            <button id="startDoorbellStream" type="button">Start Live Stream</button>
            <button id="stopDoorbellStream" type="button" class="secondary-button">Stop</button>
        </div>

        <pre id="doorbellLog" class="stream-log"></pre>

    </section>

</main>

<script src="{{ url_for('static', filename='js/doorbell.js') }}"></script>

</body>
</html>
